<body class="login-page bg-body-secondary">
<div class="login-box">
    <div class="login-logo"><a href="../index2.html"><b>Admin</b>LTE</a></div> <!-- /.login-logo -->
    <div class="card">
        <div class="card-body login-card-body">
            <p class="login-box-msg">Sign in to start your session</p>
            <form action="../index3.html" method="post">
                <div class="input-group mb-3"><input class="form-control" placeholder="Email" type="email">
                    <div class="input-group-text"><span class="bi bi-envelope"></span></div>
                </div>
                <div class="input-group mb-3"><input class="form-control" placeholder="Password" type="password">
                    <div class="input-group-text"><span class="bi bi-lock-fill"></span></div>
                </div> <!--begin::Row-->
                <div class="row">
                    <div class="col-8">
                        <div class="form-check"><input class="form-check-input" id="flexCheckDefault" type="checkbox"
                                                       value=""> <label class="form-check-label"
                                                                        for="flexCheckDefault">
                            Remember Me
                        </label></div>
                    </div> <!-- /.col -->
                    <div class="col-4">
                        <div class="d-grid gap-2">
                            <button class="btn btn-primary" type="submit">Sign In</button>
                        </div>
                    </div> <!-- /.col -->
                </div> <!--end::Row-->
            </form>
            <div class="social-auth-links text-center mb-3 d-grid gap-2">
                <p>- OR -</p> <a class="btn btn-primary" href="#"> <i class="bi bi-facebook me-2"></i> Sign in using
                Facebook
            </a> <a class="btn btn-danger" href="#"> <i class="bi bi-google me-2"></i> Sign in using Google+
            </a>
            </div> <!-- /.social-auth-links -->
            <p class="mb-1"><a href="forgot-password.html">I forgot my password</a></p>
            <p class="mb-0"><a class="text-center" href="register.html">
                Register a new membership
            </a></p>
        </div> <!-- /.login-card-body -->
    </div>
</div> <!-- /.login-box --> <!--begin::Third Party Plugin(OverlayScrollbars)-->
<script crossorigin="anonymous"
        integrity="sha256-H2VM7BKda+v2Z4+DRy69uknwxjyDRhszjXFhsL4gD3w="

<!--begin::OverlayScrollbars Configure-->
<script>
    const SELECTOR_SIDEBAR_WRAPPER = ".sidebar-wrapper";
    const Default = {
        scrollbarTheme: "os-theme-light",
        scrollbarAutoHide: "leave",
        scrollbarClickScroll: true,
    };
    document.addEventListener("DOMContentLoaded", function () {
        const sidebarWrapper = document.querySelector(SELECTOR_SIDEBAR_WRAPPER);
        if (
            sidebarWrapper &&
            typeof OverlayScrollbarsGlobal?.OverlayScrollbars !== "undefined"
        ) {
            OverlayScrollbarsGlobal.OverlayScrollbars(sidebarWrapper, {
                scrollbars: {
                    theme: Default.scrollbarTheme,
                    autoHide: Default.scrollbarAutoHide,
                    clickScroll: Default.scrollbarClickScroll,
                },
            });
        }
    });
</script> <!--end::OverlayScrollbars Configure--> <!--end::Script-->
